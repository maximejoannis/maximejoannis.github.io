<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio QA de Maxime Joannis — Tests fonctionnels, automatisation Playwright, tableaux de bord QA, CI/CD et projets QA : Homey, AmnAuditor, E-commerce Sauce." />
  <meta name="keywords" content="Maxime Joannis, Portfolio QA, Testeur QA, ISTQB, Playwright, CI/CD, Tests fonctionnels, Homey, AmnAuditor, SauceDemo" />
  <meta name="author" content="Maxime Joannis" />
  <title>Maxime Joannis — Portfolio QA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <style>
    :root {
      --primary-color: #2563eb;
      --secondary-color: #1e40af;
      --text-color: #1f2937;
      --light-text: #6b7280;
      --background: #ffffff;
      --section-bg: #f3f4f6;
      --card-bg: #ffffff;
      --border: #e5e7eb;
      --green: #22c55e;
      --purple: #a855f7;
      --orange: #fb923c;
      --cyan: #38bdf8;
      --red: #ef4444;
      --shadow: 0 18px 45px rgba(15, 23, 42, .10);
      --shadow-hover: 0 28px 70px rgba(37, 99, 235, .18);
      --radius: 1rem;
      --nav-height: 70px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Poppins", system-ui, sans-serif;
      color: var(--text-color);
      background: var(--background);
      line-height: 1.7;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
    .container { width: min(1180px, calc(100% - 2rem)); margin: 0 auto; }

    .navbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 1000;
      height: var(--nav-height);
      background: rgba(255, 255, 255, .95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(229, 231, 235, .8);
      transition: box-shadow .25s ease, background .25s ease;
    }

    .navbar.scrolled {
      box-shadow: 0 12px 38px rgba(15, 23, 42, .08);
      background: rgba(255, 255, 255, .98);
    }

    .nav-inner {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1.4rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      color: var(--primary-color);
      font-weight: 800;
      letter-spacing: -.04em;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--primary-color), #7c3aed);
      box-shadow: 0 12px 28px rgba(37, 99, 235, .25);
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      list-style: none;
      color: var(--light-text);
      font-weight: 600;
    }

    .nav-links a {
      position: relative;
      transition: color .25s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -.35rem;
      width: 0;
      height: 2px;
      background: var(--primary-color);
      border-radius: 999px;
      transition: width .25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--primary-color); }
    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }

    .language-switcher {
      justify-self: end;
      display: flex;
      gap: .35rem;
      padding: .25rem;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .lang-btn {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: .42rem .7rem;
      background: transparent;
      color: var(--light-text);
      font-weight: 700;
      cursor: pointer;
      transition: .25s ease;
    }

    .lang-btn:hover { background: var(--section-bg); }
    .lang-btn.active {
      color: var(--primary-color);
      border-color: var(--primary-color);
      background: #eff6ff;
    }

    section { padding: 6rem 0; }

    .section-title {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.15;
      letter-spacing: -.06em;
      margin-bottom: .7rem;
    }

    .section-title p {
      max-width: 760px;
      margin: 0 auto;
      color: var(--light-text);
    }

    .hero {
      min-height: 100vh;
      position: relative;
      display: grid;
      align-items: center;
      padding-top: var(--nav-height);
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      overflow: hidden;
    }

    .floating-icons {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-icon {
      position: absolute;
      opacity: 0;
      animation: floatTech 9s ease-in-out infinite;
      filter: drop-shadow(0 10px 18px rgba(37, 99, 235, .18));
    }

    @keyframes floatTech {
      0%, 100% { transform: translateY(22px) rotate(0deg); opacity: 0; }
      18%, 78% { opacity: .55; }
      50% { transform: translateY(-28px) rotate(16deg); opacity: .85; }
    }

    .hero-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1.05fr;
      gap: 3rem;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      padding: .55rem .9rem;
      border-radius: 999px;
      color: var(--secondary-color);
      background: rgba(37, 99, 235, .10);
      border: 1px solid rgba(37, 99, 235, .16);
      font-weight: 700;
      margin-bottom: 1.35rem;
    }

    .typing {
      min-height: 4.2rem;
      font-size: clamp(2.35rem, 6vw, 4.55rem);
      line-height: 1.06;
      letter-spacing: -.075em;
      font-weight: 900;
    }

    .gradient-text {
      background: linear-gradient(90deg, var(--primary-color), #7c3aed, var(--cyan));
      -webkit-background-clip: text;
      color: transparent;
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: .9em;
      background: var(--primary-color);
      margin-left: .15rem;
      vertical-align: -.08em;
      animation: blink .8s infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .lead {
      margin: 1.25rem 0 1.8rem;
      color: var(--light-text);
      font-size: clamp(1rem, 2vw, 1.16rem);
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.7rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .65rem;
      min-height: 54px;
      padding: 0 1.25rem;
      border-radius: 999px;
      border: 1px solid var(--primary-color);
      font-weight: 700;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .btn.primary {
      color: white;
      background: var(--primary-color);
      box-shadow: 0 16px 35px rgba(37, 99, 235, .28);
    }

    .btn.secondary {
      color: var(--primary-color);
      background: white;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: .85rem;
    }

    .stat {
      min-height: 82px;
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: 1rem;
      border-radius: .95rem;
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(191, 219, 254, .9);
      box-shadow: 0 14px 30px rgba(37, 99, 235, .08);
    }

    .stat i { color: var(--primary-color); font-size: 1.35rem; }
    .stat strong { display: block; font-size: 1.25rem; }
    .stat span { display: block; color: var(--light-text); font-size: .78rem; }

    .dashboard {
      border-radius: 1.4rem;
      padding: 1.4rem;
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(147, 197, 253, .85);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .dashboard::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -90px;
      top: -90px;
      background: radial-gradient(circle, rgba(124, 58, 237, .22), transparent 70%);
    }

    .dashboard > * { position: relative; z-index: 1; }
    .dash-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .dash-head h2 { font-size: 1.05rem; }
    .status-list { display: flex; flex-wrap: wrap; gap: .45rem; }
    .status {
      padding: .45rem .6rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, .12);
      color: #15803d;
      border: 1px solid rgba(34, 197, 94, .22);
      font-size: .7rem;
      font-weight: 800;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: .82fr 1.4fr 1fr;
      gap: .75rem;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: .9rem;
      background: #fff;
      padding: .95rem;
      min-width: 0;
    }

    .panel h3 {
      font-size: .82rem;
      margin-bottom: .9rem;
    }

    .donut {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      margin: 0 auto .8rem;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) 0 85%, rgba(148, 163, 184, .2) 85% 100%);
      position: relative;
    }

    .donut::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: white;
    }

    .donut strong {
      position: relative;
      color: var(--text-color);
      font-size: 1.45rem;
    }

    .legend {
      display: grid;
      gap: .35rem;
      color: var(--light-text);
      font-size: .72rem;
    }

    .legend i {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      margin-right: .35rem;
    }

    .legend .orange { background: var(--orange); }
    .legend .red { background: var(--red); }

    .chart { width: 100%; height: 150px; }
    .mini-numbers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .5rem;
      text-align: center;
    }

    .mini-numbers strong { display: block; color: var(--primary-color); }
    .mini-numbers span { display: block; color: var(--light-text); font-size: .65rem; }
    .mini-numbers .ok { color: var(--green); }
    .mini-numbers .ko { color: var(--red); }
    .mini-numbers .warn { color: #ca8a04; }

    .pipeline { display: grid; gap: .75rem; }
    .pipe-step {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: .5rem;
      align-items: center;
      font-size: .72rem;
    }

    .pipe-dot {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--green);
      color: white;
      font-weight: 900;
      font-size: .72rem;
    }

    .pipe-step small {
      display: block;
      color: #15803d;
      font-weight: 700;
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-top: .9rem;
    }

    .tool {
      padding: .45rem .65rem;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--secondary-color);
      font-weight: 700;
      font-size: .72rem;
    }

    .projects {
      background: var(--section-bg);
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.4rem;
      align-items: stretch;
    }

    .project-card {
      min-height: 480px;
      display: flex;
      flex-direction: column;
      border-radius: 1.4rem;
      padding: 1.45rem;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent), transparent 92%), transparent 45%),
        #ffffff;
      border: 1px solid color-mix(in srgb, var(--accent), transparent 62%);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease;
    }

    .project-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .project-card:hover {
      transform: translateY(-9px);
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
    }

    .tag-main {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: .45rem;
      padding: .45rem .7rem;
      border-radius: 999px;
      color: color-mix(in srgb, var(--accent), black 16%);
      background: color-mix(in srgb, var(--accent), transparent 88%);
      border: 1px solid color-mix(in srgb, var(--accent), transparent 62%);
      font-size: .72rem;
      font-weight: 900;
      margin-bottom: 1rem;
    }

    .project-top {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 1rem;
      align-items: start;
      margin-bottom: 1rem;
    }

    .project-icon {
      width: 76px;
      height: 76px;
      border-radius: 1.2rem;
      display: grid;
      place-items: center;
      font-size: 2rem;
      color: white;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent), black 22%));
      box-shadow: 0 18px 36px color-mix(in srgb, var(--accent), transparent 72%);
    }

    .project-card h3 {
      font-size: 1.35rem;
      line-height: 1.22;
      margin-bottom: .45rem;
      letter-spacing: -.04em;
    }

    .project-card p {
      color: var(--light-text);
      font-size: .92rem;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: .45rem;
      margin: .5rem 0 1.25rem;
    }

    .badge {
      border-radius: 999px;
      padding: .42rem .6rem;
      background: color-mix(in srgb, var(--accent), transparent 91%);
      border: 1px solid color-mix(in srgb, var(--accent), transparent 65%);
      color: color-mix(in srgb, var(--accent), black 18%);
      font-weight: 800;
      font-size: .7rem;
      transition: .22s ease;
    }

    .badge:hover {
      transform: translateY(-2px);
      background: var(--accent);
      color: white;
    }

    .project-actions {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid rgba(229, 231, 235, .85);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: .75rem;
      align-items: stretch;
    }

    .project-link {
      min-height: 72px;
      display: grid;
      grid-template-columns: 38px 1fr 16px;
      align-items: center;
      gap: .65rem;
      padding: .72rem;
      border-radius: .95rem;
      background: linear-gradient(135deg, color-mix(in srgb, var(--btn), transparent 88%), white);
      border: 1px solid color-mix(in srgb, var(--btn), transparent 52%);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }

    .project-link::after {
      content: "→";
      color: color-mix(in srgb, var(--btn), black 10%);
      font-weight: 900;
      transition: transform .22s ease;
    }

    .project-link:hover {
      transform: translateY(-3px);
      border-color: var(--btn);
      box-shadow: 0 14px 30px color-mix(in srgb, var(--btn), transparent 80%);
    }

    .project-link:hover::after { transform: translateX(4px); }

    .project-link b {
      width: 38px;
      height: 38px;
      border-radius: .8rem;
      display: grid;
      place-items: center;
      color: white;
      background: var(--btn);
      font-size: 1rem;
    }

    .project-link span {
      display: flex;
      flex-direction: column;
      gap: .15rem;
      line-height: 1.15;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: .72rem;
      font-weight: 800;
    }

    .project-link small {
      color: var(--light-text);
      font-size: .62rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    footer {
      padding: 2rem 0;
      text-align: center;
      color: #cbd5e1;
      background: #0f172a;
    }

    [data-i18n] { transition: opacity .18s ease; }

    .fade-section {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .7s ease, transform .7s ease;
    }

    .fade-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .hero-grid { grid-template-columns: 1fr; }
      .project-grid { grid-template-columns: 1fr; }
      .project-card { max-width: 820px; margin: 0 auto; width: 100%; }
    }

    @media (max-width: 768px) {
      .nav-inner { grid-template-columns: 1fr auto; }
      .nav-links { display: none; }
      section { padding: 4.5rem 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .dash-grid { grid-template-columns: 1fr; }
      .project-top { grid-template-columns: 1fr; }
      .project-actions { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .container { width: min(100% - 1.25rem, 1180px); }
      .logo span:not(.logo-mark) { display: none; }
      .typing { min-height: 6rem; }
      .hero-actions { flex-direction: column; }
      .btn { width: 100%; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a href="#accueil" class="logo" aria-label="Retour à l'accueil">
        <span class="logo-mark"><i class="fa-solid fa-vial-circle-check"></i></span>
        <span data-i18n="nav.logo"></span>
      </a>

      <nav aria-label="Navigation principale">
        <ul class="nav-links">
          <li><a href="#accueil" class="active" data-i18n="nav.home"></a></li>
          <li><a href="#projets" data-i18n="nav.projects"></a></li>
        </ul>
      </nav>

      <div class="language-switcher" aria-label="Sélecteur de langue">
        <button class="lang-btn" data-lang="fr" type="button">FR</button>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
      </div>
    </div>
  </header>

  <main>
    <section id="accueil" class="hero">
      <div class="floating-icons" aria-hidden="true"></div>

      <div class="container hero-grid">
        <div>
          <div>
            <i class="fa-solid fa-shield-halved"></i>
            <span data-i18n="hero.eyebrow"></span>
          </div>

          <h1 class="typing">
            <span id="typingText"></span><span class="cursor"></span>
            <br />
            <span class="gradient-text" data-i18n="hero.gradient"></span>
          </h1>

          <p class="lead" data-i18n="hero.lead"></p>

          <div class="hero-actions">
            <a class="btn primary" href="#projets">
              <i class="fa-solid fa-rocket"></i>
              <span data-i18n="hero.ctaProjects"></span>
            </a>
          </div>
        </div>

        <aside class="dashboard" aria-label="Tableau de bord QA">
          <div class="dash-head">
            <h2 data-i18n="dashboard.title"></h2>
            <div class="status-list">
              <span class="status" data-i18n="dashboard.status1"></span>
              <span class="status" data-i18n="dashboard.status2"></span>
              <span class="status" data-i18n="dashboard.status3"></span>
            </div>
          </div>

          <div class="dash-grid">
            <div class="panel">
              <h3 data-i18n="dashboard.coverage"></h3>
              <div class="donut"><strong>85%</strong></div>
              <div class="legend">
                <span><i></i><span data-i18n="dashboard.legendSuccess"></span></span>
                <span><i class="orange"></i><span data-i18n="dashboard.legendBlocked"></span></span>
                <span><i class="red"></i><span data-i18n="dashboard.legendNotRun"></span></span>
              </div>
            </div>

            <div class="panel">
              <h3 data-i18n="dashboard.automation"></h3>
              <svg class="chart" viewBox="0 0 460 170" role="img" aria-label="Graphique des tests automatisés">
                <defs>
                  <linearGradient id="line" x1="0" x2="1">
                    <stop stop-color="#38bdf8" />
                    <stop offset="1" stop-color="#a855f7" />
                  </linearGradient>
                </defs>
                <g stroke="rgba(148,163,184,.22)" stroke-width="1">
                  <path d="M0 30H460M0 70H460M0 110H460M0 150H460"/>
                  <path d="M40 0V170M110 0V170M180 0V170M250 0V170M320 0V170M390 0V170"/>
                </g>
                <polyline points="20,140 75,112 130,78 185,88 240,48 295,65 350,30 430,42" fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                <g fill="#38bdf8">
                  <circle cx="20" cy="140" r="5"/><circle cx="75" cy="112" r="5"/><circle cx="130" cy="78" r="5"/><circle cx="185" cy="88" r="5"/>
                  <circle cx="240" cy="48" r="5"/><circle cx="295" cy="65" r="5"/><circle cx="350" cy="30" r="5"/><circle cx="430" cy="42" r="5"/>
                </g>
              </svg>
              <div class="mini-numbers">
                <div><strong>35</strong><span data-i18n="dashboard.autoCount"></span></div>
                <div><strong class="ok">32</strong><span data-i18n="dashboard.successCount"></span></div>

    let currentLang = localStorage.getItem("portfolioLang")
      || (navigator.language && navigator.language.startsWith("en") ? "en" : "fr");

    let typingTimer;

    function getTranslation(path) {
      return path.split(".").reduce((obj, key) => obj && obj[key], translations[currentLang]) || "";
    }

    function applyTranslations() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach(element => {
        const key = element.getAttribute("data-i18n");
        element.style.opacity = "0";
        setTimeout(() => {
          element.textContent = getTranslation(key);
          element.style.opacity = "1";
        }, 90);
      });
    }

    function updateLangButtons() {
      document.querySelectorAll(".lang-btn").forEach(button => {
        button.classList.toggle("active", button.dataset.lang === currentLang);
      });
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("portfolioLang", lang);
      renderProjects();
      applyTranslations();
      startTyping();
      updateLangButtons();
    }

    function startTyping() {
      clearTimeout(typingTimer);
      const element = document.getElementById("typingText");
      const text = translations[currentLang].hero.typing;
      let index = 0;
      element.textContent = "";

      function type() {
        if (index <= text.length) {
          element.textContent = text.slice(0, index);
          index++;
          typingTimer = setTimeout(type, 42);
        }
      }

      type();
    }

    function renderProjects() {
      const grid = document.getElementById("projectGrid");
      grid.innerHTML = "";

      projectModels.forEach(project => {
        const content = translations[currentLang].projects[project.key];

        const card = document.createElement("article");
        card.className = "project-card";
        card.style.setProperty("--accent", project.accent);

        card.innerHTML = `
          <span class="tag-main"><i class="fa-solid fa-circle-dot"></i>${translations[currentLang].projectTag}</span>

          <div class="project-top">
            <div class="project-icon"><i class="${project.icon}"></i></div>
            <div>
              <h3>${content.name}</h3>
              <p>${content.description}</p>
            </div>
          </div>

          <div class="badges">
            ${content.badges.map(badge => `<span class="badge">${badge}</span>`).join("")}
          </div>

          <div class="project-actions" aria-label="Actions disponibles pour le projet ${content.name}">
            ${project.buttons.map(button => `
              <a class="project-link" href="${button.href}" style="--btn:${button.color}" aria-label="${translations[currentLang].buttons[button.labelKey]} pour ${content.name}">
                <b><i class="${button.icon}"></i></b>
                <span>
                  ${translations[currentLang].buttons[button.labelKey]}
                  <small>${translations[currentLang].buttons[button.hintKey]}</small>
                </span>
              </a>
            `).join("")}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function createFloatingIcons() {
      const icons = [
        ["fa-brands fa-html5", "#e34f26"],
        ["fa-brands fa-css3-alt", "#1572b6"],
        ["fa-brands fa-js", "#f7df1e"],
        ["fa-brands fa-github", "#111827"],
        ["fa-solid fa-bug", "#ef4444"],
        ["fa-solid fa-vial", "#2563eb"],
        ["fa-solid fa-robot", "#7c3aed"],
        ["fa-solid fa-gears", "#0ea5e9"],
        ["fa-solid fa-shield-halved", "#16a34a"]
      ];

      const wrapper = document.querySelector(".floating-icons");
      wrapper.innerHTML = "";

      icons.forEach(([icon, color], index) => {
        const element = document.createElement("i");
        element.className = `${icon} floating-icon`;
        element.style.color = color;
        element.style.left = `${8 + Math.random() * 84}%`;
        element.style.top = `${12 + Math.random() * 72}%`;
        element.style.fontSize = `${1.3 + Math.random() * 1.7}rem`;
        element.style.animationDelay = `${index * .65}s`;
        element.style.animationDuration = `${7 + Math.random() * 5}s`;
        wrapper.appendChild(element);
      });
    }

    function initScrollEffects() {
      const navbar = document.querySelector(".navbar");
      const sections = document.querySelectorAll("main section[id]");
      const navLinks = document.querySelectorAll(".nav-links a");

      window.addEventListener("scroll", () => {
        navbar.classList.toggle("scrolled", window.scrollY > 20);

        let current = "accueil";
        sections.forEach(section => {
          const top = section.offsetTop - 120;
          if (window.scrollY >= top) current = section.id;
        });

        navLinks.forEach(link => {
          link.classList.toggle("active", link.getAttribute("href") === `#${current}`);
        });
      });
    }

    function initRevealAnimations() {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add("visible");
        });
      }, { threshold: .14 });

      document.querySelectorAll(".fade-section").forEach(section => observer.observe(section));
    }

    function initLanguageSwitcher() {
      document.querySelectorAll(".lang-btn").forEach(button => {
        button.addEventListener("click", () => setLanguage(button.dataset.lang));
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      createFloatingIcons();
      renderProjects();
      applyTranslations();
      startTyping();
      updateLangButtons();
      initLanguageSwitcher();
      initScrollEffects();
      initRevealAnimations();
    });
